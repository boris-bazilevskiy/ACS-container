<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ACS Calling App</title>
</head>
<body>
  <h2>ACS Calling Demo</h2>

  <label>
    ACS User ID (generated)
    <input id="user-id-output" readonly style="width: 480px;" />
  </label>

  <br /><br />

  <label>
    Caller ID (phone number for PSTN)
    <input id="caller-id-input" placeholder="+1234567890" />
  </label>

  <br /><br />

  <label>
    Caller Name
    <input id="caller-name-input" placeholder="Enter caller name" />
  </label>

  <br /><br />

  <label>
    Callee (ACS ID or phone number)
    <input id="callee-id-input" placeholder="8:acs:... or +1234567890" />
  </label>

  <br /><br />

  <button id="callButton">Start Call</button>
  <button id="hangUpButton">Hang Up</button>

  <script type="module" src="./calling-client.js"></script>
</body>
</html>
